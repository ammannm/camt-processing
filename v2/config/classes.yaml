  - id: r_credit_account_management_ascii
    match_against: source_text
    keyword: "PREIS FUER DIE KONTOFUEHRUNG"
    min_similarity: 96
    class: credit_account_management

  - id: r_credit_cash_deposits
    match_against: source_text
    keyword: "PREIS FUER BAREINZAHLUNGEN EIGENES KONTO KARTEN"
