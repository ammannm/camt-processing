services:
  postgres:
    image: postgres:16-alpine
    container_name: camt053-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: camt053_mvp
      POSTGRES_USER: camt_user
      POSTGRES_PASSWORD: camt_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camt_user -d camt053_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

