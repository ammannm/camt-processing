<main class="mx-auto min-h-screen max-w-6xl px-4 py-8 sm:px-8">
  <header class="mb-6 flex flex-col gap-2">
    <p class="text-sm font-semibold uppercase tracking-[0.2em] text-emerald-700">
      MVP Dashboard
    </p>
    <h1 class="text-3xl font-bold text-slate-900">CAMT.053 Processing</h1>
    <p class="text-slate-600">
      Angular + AG Grid + Tailwind als Startpunkt fuer deinen Workflow.
    </p>
  </header>

  <section class="mb-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <label class="inline-flex cursor-pointer items-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white">
        CAMT.053 XML hochladen
        <input
          type="file"
          accept=".xml,text/xml,application/xml"
          class="hidden"
          (change)="onFileSelected($event)"
          [disabled]="isUploading"
        />
      </label>
      <p class="text-sm text-slate-600">{{ uploadMessage }}</p>
    </div>
  </section>

  <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <ag-grid-angular
      class="ag-theme-quartz h-[560px] w-full"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [gridOptions]="gridOptions"
      [rowData]="rowData"
      (cellClicked)="onCellClicked($event)"
    />
  </section>
</main>
